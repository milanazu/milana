<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Milana Žuravleva - Jen počkej zajíci</title>
    <style>
        :root {
            --primary-blue: #1a4a7a;
            --accent-orange: #ff9800;
            --egg-yellow: #ffd700;
        }
        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--primary-blue);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        #intro-section {
            max-width: 900px;
            padding: 40px;
            display: block;
            text-align: center;
        }
        h1 {
            color: var(--egg-yellow);
            font-size: 3rem;
            text-shadow: 4px 4px 0px #000, -2px -2px 0px var(--accent-orange);
            margin-bottom: 30px;
        }
        .info-box {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 35px;
            border-radius: 20px;
            border: 8px solid var(--accent-orange);
            line-height: 1.8;
            text-align: left;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-size: 1.1rem;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 35px;
            background-color: var(--accent-orange);
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 50px;
            border: 3px solid white;
            transition: 0.2s;
        }
        .btn:hover { background-color: #ffab2e; }
    </style>
</head>
<body>

<div id="intro-section">
    <h1>Milana Žuravleva<br>Jen počkej, zajíci!</h1>
    
    <div class="info-box">
        <p><strong>Jen počkej, zajíci!</strong> (rusky Ну, погоди!, transkripce Nu, pogodi!) je legendární sovětská série krátkých kreslených příběhů...</p>
        <p>Hlavním motivem je věčný souboj vlka a chytrého zajíce...</p>

        <!-- Odkaz na PDF projekt -->
        <a href="cpp.html" class="btn">Zobrazit můj PDF projekt</a>
    </div>
</div>

</body>
</html>
